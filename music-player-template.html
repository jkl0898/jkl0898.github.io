  音乐播放器 HTML 模板
  此文件用于说明播放器结构，实际使用时请在 index.html 中添加对应代码
-->

<!-- 在 body 标签结束前添加以下代码 -->
<div id="aplayer-fixed"></div>

<!-- 
  使用说明:
  
  1. 在需要添加播放器的页面 HTML 中引入以下资源:
     - APlayer CSS: https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css
     - APlayer JS: https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js
     - 本地 CSS: /css/aplayer.css
     - 本地 JS: /js/music-player.js
  
  2. 配置音乐列表:
     编辑 /js/music-player.js 文件中的 audio 数组
  
  3. 音乐资源获取方式:
     
     a) 网易云音乐:
        - 打开网易云音乐网页版
        - 找到歌曲，复制 URL
        - 或使用网易云音乐外链链接
        
     b) QQ 音乐:
        - 打开 QQ 音乐网页版
        - 分享歌曲，获取外链地址
        
     c) 阿里云 OSS (推荐):
        - 将 MP3 文件上传到阿里云 OSS
        - 获取公开访问链接
        - 优点是稳定、快速、可控
        
     d) 其他图床/音床服务
  
  4. 自定义配置:
     修改 music-player.js 中的 playerOptions 对象
-->
